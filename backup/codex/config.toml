# ============================================================
# 功能开关
# ============================================================
[features]
multi_agent = true
child_agents_md = true
codex_hooks = true
memories = true

# ============================================================
# 记忆与历史
# ============================================================
[memories]
use_memories = true
generate_memories = true
max_rollout_age_days = 30
min_rollout_idle_hours = 12

[history]
persistence = "save-all"
max_bytes = 20971520  # 20MB

# ============================================================
# Agent 运行时配置
# ============================================================
[agents]
max_threads = 6
max_depth = 2

[env]
USE_OMX_EXPLORE_CMD = "1"
